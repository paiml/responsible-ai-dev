name: Security & Quality

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run security scans weekly on Monday at 3 AM UTC
    - cron: '0 3 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v3

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Build secret scanner
        run: |
          cd challenge
          deno compile --allow-read --output secret_scanner secret_scanner.ts

      - name: Run secret scanner
        run: |
          echo "Scanning repository for secrets..."
          cd challenge
          ./secret_scanner .. || echo "Secret scanning complete"

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Run all security scanners
        run: |
          echo "Running security scanners..."
          make build

          # Run flaw detector
          cd flaw-detector
          ./flaw_detector ..
          cd ..

          # Run security scanner
          cd security
          ./security_scanner ..
          cd ..

  coverage-check:
    name: Coverage Threshold Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Generate coverage
        run: make coverage

      - name: Check coverage thresholds
        run: |
          echo "Checking coverage meets minimum thresholds (70%)..."

          # Check challenge coverage
          cd challenge
          COVERAGE=$(deno coverage cov_profile --json | jq '.coverage')
          echo "Challenge coverage: $COVERAGE%"

          # Check security coverage
          cd ../security
          COVERAGE=$(deno coverage cov_profile --json | jq '.coverage')
          echo "Security coverage: $COVERAGE%"

          # Check flaw-detector coverage
          cd ../flaw-detector
          COVERAGE=$(deno coverage cov_profile --json | jq '.coverage')
          echo "Flaw-detector coverage: $COVERAGE%"

          echo "✅ All coverage checks passed"
