name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Check PR title
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          echo "PR Title: $PR_TITLE"
          if [ ${#PR_TITLE} -lt 10 ]; then
            echo "❌ PR title too short (minimum 10 characters)"
            exit 1
          fi
          echo "✅ PR title length OK"

      - name: Run quality gates
        run: make validate

      - name: Check for large files
        run: |
          echo "Checking for large files in PR..."
          git diff --name-only origin/${{ github.base_ref }}...HEAD | while read file; do
            if [ -f "$file" ]; then
              size=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file" 2>/dev/null || echo 0)
              if [ "$size" -gt 1048576 ]; then
                echo "❌ Large file detected: $file ($(numfmt --to=iec $size 2>/dev/null || echo $size bytes))"
                exit 1
              fi
            fi
          done
          echo "✅ No large files detected"

      - name: Comment on PR
        uses: actions/github-script@v7
        if: success()
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ All quality checks passed! Ready for review.'
            })
