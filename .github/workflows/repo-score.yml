name: Repository Score

on:
  push:
    branches: [ main, master ]
  schedule:
    # Run weekly on Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  repo-score:
    name: Calculate Repo Score
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Install pmat (if available)
        run: |
          if ! command -v pmat &> /dev/null; then
            echo "⚠️  pmat not installed, skipping repo-score"
            echo "Install pmat from: https://github.com/paiml/paiml-mcp-agent-toolkit"
            exit 0
          fi
        continue-on-error: true

      - name: Calculate repository score
        run: |
          if command -v pmat &> /dev/null; then
            pmat repo-score --path . --format markdown --output REPO-SCORE.md
            pmat repo-score --path . --format json --output repo-score.json
            pmat repo-score --path . --verbose
          else
            echo "Skipping repo-score calculation"
          fi
        continue-on-error: true

      - name: Upload score reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: repo-score
          path: |
            REPO-SCORE.md
            repo-score.json
          if-no-files-found: ignore

      - name: Comment score on commit
        uses: actions/github-script@v7
        if: github.event_name == 'push' && hashFiles('REPO-SCORE.md') != ''
        with:
          script: |
            const fs = require('fs');
            try {
              const score = fs.readFileSync('REPO-SCORE.md', 'utf8');
              await github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
                body: `## 📊 Repository Health Score\n\n${score}`
              });
            } catch (error) {
              console.log('Could not post score:', error.message);
            }
        continue-on-error: true
